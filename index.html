<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>سینەمای ئێمە - پلاتفۆرمی فیلم</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ڕەنگی سەرەکی #fbb255 */
        :root {
            --primary: #fbb255;
            --primary-glow: 0 0 20px #fbb255;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
        }

        /* لۆدەری سەرەتا */
        #initial-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        .loader-content {
            text-align: center;
        }
        .loader-icon {
            font-size: 5rem;
            color: var(--primary);
            filter: drop-shadow(0 0 30px var(--primary));
            animation: spin 2s infinite linear;
        }
        .loader-text {
            margin-top: 20px;
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ناوەڕۆکی سەرەکی */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* هێدەر */
        header {
            background: rgba(0,0,0,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            padding: 10px 0;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            max-width: 1400px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            font-size: 2rem;
        }
        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
        }
        .search-box input:focus {
            outline: none;
            box-shadow: 0 0 20px var(--primary);
        }
        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.2rem;
            cursor: pointer;
        }
        .menu-icons {
            display: flex;
            gap: 15px;
        }
        .menu-icons i {
            color: var(--primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .menu-icons i:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 15px var(--primary));
        }

        /* سلایدەر */
        .hero-slider {
            position: relative;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
        }
        .slider-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s;
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }
        .slide.active {
            opacity: 1;
        }
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #000 10%, transparent 80%);
        }
        .slide-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
        }
        .slide-content h2 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--primary);
        }
        .slide-content p {
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .slide-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .slide-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary);
        }

        /* ڕیکلام */
        .ad-compact {
            max-width: 500px;
            margin: 20px auto;
            padding: 15px;
            background: linear-gradient(145deg, #111, #000);
            border: 2px solid var(--primary);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.3s;
        }
        .ad-compact:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px var(--primary);
        }
        .ad-icon {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ad-icon i {
            color: #000;
            font-size: 1.5rem;
        }
        .ad-text {
            flex: 1;
            padding: 0 15px;
        }
        .ad-text h4 {
            color: var(--primary);
            font-size: 1rem;
        }
        .ad-text p {
            color: #ccc;
            font-size: 0.8rem;
        }
        .ad-arrow i {
            color: var(--primary);
            font-size: 1.5rem;
        }

        /* مۆدال */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #111;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 3px solid var(--primary);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
        }
        .modal-title {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: var(--primary);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px var(--primary);
        }
        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .preview-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--primary);
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover {
            box-shadow: 0 0 30px var(--primary);
            transform: scale(1.02);
        }

        /* کەتەگۆری */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            justify-content: center;
        }
        .category-item {
            background: #111;
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .category-item i {
            font-size: 1.1rem;
        }
        .category-item.active,
        .category-item:hover {
            background: var(--primary);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px var(--primary);
        }

        /* فیلمەکان - ڕیسپۆنسیڤ بۆ موبایل */
        .movies-section {
            padding: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .section-title {
            color: var(--primary);
            font-size: 1.8rem;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .movie-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 25px rgba(251, 178, 85, 0.3);
        }
        .movie-poster {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-info {
            padding: 10px;
        }
        .movie-info h4 {
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rating {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
        }
        .rating i {
            color: var(--primary);
        }

        /* کارلێک */
        .interaction-section {
            padding: 15px;
            max-width: 800px;
            margin: 20px auto;
        }
        .interaction-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .action-btn {
            background: #111;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .action-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }
        .share-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .share-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #111;
            border: 2px solid var(--primary);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .share-btn:hover {
            background: var(--primary);
            color: #000;
            transform: rotate(360deg);
        }
        .comments-section {
            margin-top: 20px;
        }
        .comment-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .comment-input input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 2px solid var(--primary);
            background: #111;
            color: white;
        }
        .comment-input button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        .comment-input button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary);
        }
        .comment {
            background: #111;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .comment-header {
            display: flex;
            justify-content: space-between;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        /* دوگمەی ئەپڵۆد */
        .upload-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 0 30px var(--primary);
            transition: 0.3s;
        }
        .upload-btn i {
            font-size: 2rem;
            color: #000;
        }
        .upload-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* فووتەر */
        footer {
            background: #050505;
            padding: 30px 15px;
            text-align: center;
            margin-top: 40px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .social-icons i {
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }
        .social-icons i:hover {
            transform: scale(1.3) rotate(360deg);
            filter: drop-shadow(0 0 20px var(--primary));
        }

        /* بۆ موبایل */
        @media (max-width: 480px) {
            .movies-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .movie-info h4 {
                font-size: 0.8rem;
            }
            .header-container {
                flex-direction: column;
            }
            .search-box {
                max-width: 100%;
            }
            .category-item {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
            .hero-slider {
                height: 40vh;
            }
        }
    </style>
</head>
<body>
    <!-- لۆدەری سەرەتا -->
    <div id="initial-loader">
        <div class="loader-content">
            <i class="fas fa-film loader-icon"></i>
            <div class="loader-text">سینەمای ئێمە</div>
        </div>
    </div>

    <!-- ناوەڕۆکی سەرەکی -->
    <div id="main-content">
        <header>
            <div class="header-container">
                <div class="logo">
                    <i class="fas fa-clapperboard"></i>
                    <span>سینەمای ئێمە</span>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="گەڕان بۆ فیلم...">
                    <i class="fas fa-search" id="searchBtn"></i>
                </div>
                <div class="menu-icons">
                    <i class="fas fa-heart" id="favoritesIcon"></i>
                    <i class="fas fa-bookmark" id="bookmarkIcon"></i>
                    <i class="fas fa-bell" id="notificationIcon"></i>
                </div>
            </div>
        </header>

        <!-- سلایدەر -->
        <section class="hero-slider">
            <div class="slider-container" id="slider"></div>
        </section>

        <!-- ڕیکلام -->
        <div class="ad-compact" id="adCompact">
            <div class="ad-icon">
                <i class="fas fa-bullhorn"></i>
            </div>
            <div class="ad-text">
                <h4>ڕیکلام و پەیوەندی</h4>
                <p>کلیک بکە بۆ دانانی ڕیکلام</p>
            </div>
            <div class="ad-arrow">
                <i class="fas fa-arrow-left"></i>
            </div>
        </div>

        <!-- مۆدالی ڕیکلام -->
        <div class="modal" id="adModal">
            <div class="modal-content">
                <i class="fas fa-times modal-close" id="closeAdModal"></i>
                <h2 class="modal-title"><i class="fas fa-ad"></i> ڕیکلام و پەیوەندی</h2>
                <form id="adForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> ناو و پێکهاتە</label>
                        <input type="text" id="adName" placeholder="ناوی تەواو" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> ژمارە موبایل</label>
                        <input type="tel" id="adPhone" placeholder="+964 7XX XXX XXXX" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-link"></i> لینکی سۆشیاڵ میدیا</label>
                        <input type="url" id="adSocial" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> وێنەی ڕیکلام</label>
                        <input type="file" id="adImages" multiple accept="image/*">
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> تێبینی</label>
                        <textarea id="adMessage" rows="4" placeholder="وردەکاری ڕیکلامەکەت بنووسە..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> ناردن</button>
                </form>
            </div>
        </div>

        <!-- مۆدالی ئەپڵۆد -->
        <div class="modal" id="uploadModal">
            <div class="modal-content">
                <i class="fas fa-times modal-close" id="closeUploadModal"></i>
                <h2 class="modal-title"><i class="fas fa-upload"></i> ئەپڵۆدکردنی فیلم</h2>
                <form id="uploadForm">
                    <div class="form-group">
                        <label><i class="fas fa-film"></i> ناوی فیلم</label>
                        <input type="text" id="movieTitle" placeholder="ناوی فیلمەکە" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tags"></i> کەتەگۆری</label>
                        <select id="movieCategory">
                            <option value="ئەکشن">ئەکشن</option>
                            <option value="کۆمیدی">کۆمیدی</option>
                            <option value="دراما">دراما</option>
                            <option value="ڕۆمانسی">ڕۆمانسی</option>
                            <option value="خەیاڵی">خەیاڵی</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-file-video"></i> فایلی فیلم</label>
                        <input type="file" id="movieFile" accept="video/*" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-image"></i> پۆستەری فیلم</label>
                        <input type="file" id="moviePoster" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-align-left"></i> کاپشن</label>
                        <textarea id="movieDescription" rows="3" placeholder="کورتەی فیلمەکە..."></textarea>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> ساڵ</label>
                        <input type="number" id="movieYear" placeholder="2025">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-star"></i> ڕێتینگ</label>
                        <input type="number" id="movieRating" min="1" max="10" step="0.1" placeholder="8.5">
                    </div>
                    <button type="submit" class="submit-btn"><i class="fas fa-cloud-upload-alt"></i> ئەپڵۆدکردن</button>
                </form>
            </div>
        </div>

        <!-- دوگمەی ئەپڵۆد -->
        <div class="upload-btn" id="uploadBtn">
            <i class="fas fa-plus"></i>
        </div>

        <!-- کەتەگۆری -->
        <div class="categories" id="categories">
            <div class="category-item active" data-category="all"><i class="fas fa-fire"></i> هەموو</div>
            <div class="category-item" data-category="ئەکشن"><i class="fas fa-skull"></i> ئەکشن</div>
            <div class="category-item" data-category="کۆمیدی"><i class="fas fa-laugh"></i> کۆمیدی</div>
            <div class="category-item" data-category="ڕۆمانسی"><i class="fas fa-heart"></i> ڕۆمانسی</div>
            <div class="category-item" data-category="خەیاڵی"><i class="fas fa-robot"></i> خەیاڵی</div>
            <div class="category-item" data-category="دراما"><i class="fas fa-dragon"></i> دراما</div>
        </div>

        <!-- فیلمەکان -->
        <div class="movies-section">
            <h2 class="section-title"><i class="fas fa-star"></i> فیلمە دیارەکان</h2>
            <div class="movies-grid" id="moviesGrid"></div>
        </div>

        <!-- کارلێک -->
        <div class="interaction-section">
            <div class="interaction-buttons">
                <button class="action-btn" id="likeBtn"><i class="fas fa-heart"></i> <span id="likeCount">124</span> لایک</button>
                <button class="action-btn" id="dislikeBtn"><i class="fas fa-thumbs-down"></i> <span id="dislikeCount">12</span></button>
                <div class="share-buttons">
                    <button class="share-btn" data-share="facebook"><i class="fab fa-facebook-f"></i></button>
                    <button class="share-btn" data-share="twitter"><i class="fab fa-twitter"></i></button>
                    <button class="share-btn" data-share="whatsapp"><i class="fab fa-whatsapp"></i></button>
                    <button class="share-btn" data-share="telegram"><i class="fab fa-telegram"></i></button>
                </div>
            </div>
            
            <div class="comments-section">
                <h3 style="color: var(--primary); margin-bottom: 15px;">کۆمێنتەکان</h3>
                <div class="comment-input">
                    <input type="text" id="commentInput" placeholder="کۆمێنت بنووسە...">
                    <button id="sendComment"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="comments-list" id="commentsList"></div>
            </div>
        </div>

        <footer>
            <div class="social-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-tiktok"></i>
            </div>
            <p>© 2025 سینەمای ئێمە - هەموو مافەکان پارێزراون</p>
        </footer>
    </div>

    <script>
        // چارەسەرکردنی هەڵەکان - وەشانی کارا
        (function() {
            // دڵنیابوون لە بوونی DOM
            document.addEventListener('DOMContentLoaded', function() {
                
                // لۆدەری سەرەتا
                setTimeout(function() {
                    var loader = document.getElementById('initial-loader');
                    var mainContent = document.getElementById('main-content');
                    if (loader && mainContent) {
                        loader.style.opacity = '0';
                        setTimeout(function() {
                            loader.style.display = 'none';
                            mainContent.style.opacity = '1';
                        }, 500);
                    }
                }, 1500);

                // داتای فیلمەکان
                var movies = [
                    { id: 1, title: 'ئینترستێلەر', poster: 'https://via.placeholder.com/300x450/222/fff?text=Interstellar', rating: 4.8, category: 'خەیاڵی', year: 2014 },
                    { id: 2, title: 'دەستپێک', poster: 'https://via.placeholder.com/300x450/333/fff?text=Inception', rating: 4.9, category: 'ئەکشن', year: 2010 },
                    { id: 3, title: 'کیک ئاسس', poster: 'https://via.placeholder.com/300x450/444/fff?text=Kick-Ass', rating: 4.5, category: 'کۆمیدی', year: 2010 },
                    { id: 4, title: 'تایتانیک', poster: 'https://via.placeholder.com/300x450/555/fff?text=Titanic', rating: 4.7, category: 'ڕۆمانسی', year: 1997 },
                    { id: 5, title: 'شاوشانک', poster: 'https://via.placeholder.com/300x450/666/fff?text=Shawshank', rating: 5.0, category: 'دراما', year: 1994 },
                    { id: 6, title: 'جلادیاتۆر', poster: 'https://via.placeholder.com/300x450/777/fff?text=Gladiator', rating: 4.8, category: 'ئەکشن', year: 2000 },
                    { id: 7, title: 'دارک نایت', poster: 'https://via.placeholder.com/300x450/888/fff?text=Dark+Knight', rating: 5.0, category: 'ئەکشن', year: 2008 },
                    { id: 8, title: 'فۆڕێست گامپ', poster: 'https://via.placeholder.com/300x450/999/fff?text=Forrest+Gump', rating: 4.9, category: 'دراما', year: 1994 }
                ];

                // کۆمێنتەکان
                var comments = [
                    { user: 'کاروان عەلی', text: 'فیلمەکە زۆر خۆش بوو، پێشنیاری دەکەم', time: '٢ خولەک پێش ئێستا' },
                    { user: 'شیلان محەمەد', text: 'دەنگۆی فیلمەکە زۆر باشە', time: '١ سەعات پێش ئێستا' }
                ];

                // لایک و دیسلایک
                var likes = 124;
                var dislikes = 12;

                // پڕکردنەوەی گریدی فیلم
                var moviesGrid = document.getElementById('moviesGrid');
                var searchInput = document.getElementById('searchInput');
                var searchBtn = document.getElementById('searchBtn');
                var categoryItems = document.querySelectorAll('.category-item');
                
                function displayMovies(filterCategory, searchTerm) {
                    if (!moviesGrid) return;
                    
                    filterCategory = filterCategory || 'all';
                    searchTerm = searchTerm || '';
                    
                    moviesGrid.innerHTML = '';
                    
                    var filteredMovies = movies.filter(function(movie) {
                        var matchCategory = filterCategory === 'all' || movie.category === filterCategory;
                        var matchSearch = movie.title.toLowerCase().includes(searchTerm.toLowerCase());
                        return matchCategory && matchSearch;
                    });
                    
                    if (filteredMovies.length === 0) {
                        moviesGrid.innerHTML = '<p style="color: var(--primary); text-align: center; grid-column: 1/-1; padding: 20px;">هیچ فیلمێک نەدۆزرایەوە</p>';
                        return;
                    }
                    
                    filteredMovies.forEach(function(movie) {
                        var card = document.createElement('div');
                        card.className = 'movie-card';
                        card.innerHTML = '<img src="' + movie.poster + '" alt="' + movie.title + '" class="movie-poster">' +
                            '<div class="movie-info">' +
                            '<h4>' + movie.title + '</h4>' +
                            '<div class="rating">' +
                            '<i class="fas fa-star"></i> ' + movie.rating +
                            '<i class="fas fa-calendar" style="margin-left: auto;"></i> ' + movie.year +
                            '</div>' +
                            '</div>';
                        moviesGrid.appendChild(card);
                    });
                }
                
                displayMovies('all', '');

                // کەتەگۆری کلیک
                if (categoryItems.length) {
                    categoryItems.forEach(function(item) {
                        item.addEventListener('click', function() {
                            categoryItems.forEach(function(i) { i.classList.remove('active'); });
                            this.classList.add('active');
                            var category = this.getAttribute('data-category') || 'all';
                            displayMovies(category, searchInput ? searchInput.value : '');
                        });
                    });
                }

                // گەڕان
                if (searchBtn && searchInput) {
                    searchBtn.addEventListener('click', function() {
                        var activeCategory = document.querySelector('.category-item.active');
                        var category = activeCategory ? activeCategory.getAttribute('data-category') : 'all';
                        displayMovies(category, searchInput.value);
                    });

                    searchInput.addEventListener('keyup', function(e) {
                        if (e.key === 'Enter') {
                            var activeCategory = document.querySelector('.category-item.active');
                            var category = activeCategory ? activeCategory.getAttribute('data-category') : 'all';
                            displayMovies(category, this.value);
                        }
                    });
                }

                // سلایدەر
                var sliderContainer = document.getElementById('slider');
                var slides = [
                    { title: 'ئەفسانەی کینگ کۆنگ', desc: 'فیلمێکی سەرکێشی خەیاڵی', bg: 'https://via.placeholder.com/1600x800/222/fff?text=King+Kong' },
                    { title: 'ئەڤەتار: ڕێگای ئاو', desc: 'گەڕانەوە بۆ پاندۆرا', bg: 'https://via.placeholder.com/1600x800/333/fff?text=Avatar' },
                    { title: 'دەستپێکێکی تر', desc: 'گەشتێک لە ناو مێشکدا', bg: 'https://via.placeholder.com/1600x800/444/fff?text=Inception' }
                ];

                function initSlider() {
                    if (!sliderContainer) return;
                    sliderContainer.innerHTML = '';
                    slides.forEach(function(slide, index) {
                        var slideDiv = document.createElement('div');
                        slideDiv.className = 'slide' + (index === 0 ? ' active' : '');
                        slideDiv.style.backgroundImage = "url('" + slide.bg + "')";
                        slideDiv.innerHTML = '<div class="slide-content">' +
                            '<h2>' + slide.title + '</h2>' +
                            '<p>' + slide.desc + '</p>' +
                            '<button class="slide-btn"><i class="fas fa-play"></i> سەیرکردن</button>' +
                            '</div>';
                        sliderContainer.appendChild(slideDiv);
                    });
                }
                initSlider();

                // گۆڕینی سلایدەر
                var currentSlide = 0;
                setInterval(function() {
                    var slides = document.querySelectorAll('.slide');
                    if (slides.length) {
                        slides[currentSlide].classList.remove('active');
                        currentSlide = (currentSlide + 1) % slides.length;
                        slides[currentSlide].classList.add('active');
                    }
                }, 5000);

                // مۆدالەکان
                var adModal = document.getElementById('adModal');
                var uploadModal = document.getElementById('uploadModal');
                var adCompact = document.getElementById('adCompact');
                var uploadBtn = document.getElementById('uploadBtn');
                var closeAdModal = document.getElementById('closeAdModal');
                var closeUploadModal = document.getElementById('closeUploadModal');

                if (adCompact && adModal) {
                    adCompact.addEventListener('click', function() {
                        adModal.classList.add('active');
                    });
                }

                if (uploadBtn && uploadModal) {
                    uploadBtn.addEventListener('click', function() {
                        uploadModal.classList.add('active');
                    });
                }

                if (closeAdModal && adModal) {
                    closeAdModal.addEventListener('click', function() {
                        adModal.classList.remove('active');
                    });
                }

                if (closeUploadModal && uploadModal) {
                    closeUploadModal.addEventListener('click', function() {
                        uploadModal.classList.remove('active');
                    });
                }

                window.addEventListener('click', function(e) {
                    if (e.target === adModal && adModal) adModal.classList.remove('active');
                    if (e.target === uploadModal && uploadModal) uploadModal.classList.remove('active');
                });

                // پێشبینینی وێنە
                var adImages = document.getElementById('adImages');
                var imagePreview = document.getElementById('imagePreview');

                if (adImages && imagePreview) {
                    adImages.addEventListener('change', function(e) {
                        imagePreview.innerHTML = '';
                        for (var i = 0; i < e.target.files.length; i++) {
                            var file = e.target.files[i];
                            var reader = new FileReader();
                            reader.onload = function(e) {
                                var img = document.createElement('img');
                                img.src = e.target.result;
                                img.className = 'preview-img';
                                imagePreview.appendChild(img);
                            };
                            reader.readAsDataURL(file);
                        }
                    });
                }

                // ناردنی فۆڕمی ڕیکلام
                var adForm = document.getElementById('adForm');
                if (adForm) {
                    adForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        alert('ڕیکلامەکەت بە سەرکەوتوویی نێردرا');
                        this.reset();
                        if (imagePreview) imagePreview.innerHTML = '';
                        if (adModal) adModal.classList.remove('active');
                    });
                }

                // ئەپڵۆدکردنی فیلم
                var uploadForm = document.getElementById('uploadForm');
                if (uploadForm) {
                    uploadForm.addEventListener('submit', function(e) {
                        e.preventDefault();
                        
                        var movieTitle = document.getElementById('movieTitle');
                        var movieCategory = document.getElementById('movieCategory');
                        var movieYear = document.getElementById('movieYear');
                        var movieRating = document.getElementById('movieRating');
                        
                        var newMovie = {
                            id: movies.length + 1,
                            title: movieTitle ? movieTitle.value : 'فیلمی نوێ',
                            category: movieCategory ? movieCategory.value : 'ئەکشن',
                            year: movieYear ? (parseInt(movieYear.value) || 2025) : 2025,
                            rating: movieRating ? (parseFloat(movieRating.value) || 5.0) : 5.0,
                            poster: 'https://via.placeholder.com/300x450/fbb255/000?text=' + encodeURIComponent(movieTitle ? movieTitle.value : 'New')
                        };
                        
                        movies.push(newMovie);
                        displayMovies('all', '');
                        
                        alert('فیلمەکە بە سەرکەوتوویی ئەپڵۆد کرا');
                        this.reset();
                        if (uploadModal) uploadModal.classList.remove('active');
                    });
                }

                // کۆمێنت
                var commentsList = document.getElementById('commentsList');
                var sendComment = document.getElementById('sendComment');
                var commentInput = document.getElementById('commentInput');
                
                function displayComments() {
                    if (!commentsList) return;
                    commentsList.innerHTML = '';
                    
                    comments.forEach(function(comment) {
                        var commentDiv = document.createElement('div');
                        commentDiv.className = 'comment';
                        commentDiv.innerHTML = '<div class="comment-header">' +
                            '<span><i class="fas fa-user-circle"></i> ' + comment.user + '</span>' +
                            '<span>' + comment.time + '</span>' +
                            '</div>' +
                            '<p>' + comment.text + '</p>';
                        commentsList.appendChild(commentDiv);
                    });
                }
                
                displayComments();

                if (sendComment && commentInput) {
                    sendComment.addEventListener('click', function() {
                        if (commentInput.value.trim()) {
                            var newComment = {
                                user: 'بەکارهێنەر',
                                text: commentInput.value,
                                time: 'ئێستا'
                            };
                            comments.unshift(newComment);
                            displayComments();
                            commentInput.value = '';
                        }
                    });

                    commentInput.addEventListener('keypress', function(e) {
                        if (e.key === 'Enter') {
                            if (sendComment) sendComment.click();
                        }
                    });
                }

                // لایک
                var likeBtn = document.getElementById('likeBtn');
                var likeCount = document.getElementById('likeCount');
                var dislikeBtn = document.getElementById('dislikeBtn');
                var dislikeCount = document.getElementById('dislikeCount');

                if (likeBtn && likeCount) {
                    likeBtn.addEventListener('click', function() {
                        likes++;
                        likeCount.textContent = likes;
                        this.style.background = 'var(--primary)';
                        this.style.color = '#000';
                        setTimeout(function() {
                            likeBtn.style.background = '';
                            likeBtn.style.color = '';
                        }, 300);
                    });
                }

                if (dislikeBtn && dislikeCount) {
                    dislikeBtn.addEventListener('click', function() {
                        dislikes++;
                        dislikeCount.textContent = dislikes;
                    });
                }

                // شەیر کردن
                var shareBtns = document.querySelectorAll('.share-btn');
                shareBtns.forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        var platform = this.getAttribute('data-share');
                        var url = encodeURIComponent(window.location.href);
                        var text = encodeURIComponent('سەیری ئەم فیلمە بکە لە سینەمای ئێمە');
                        
                        var shareUrl = '';
                        switch(platform) {
                            case 'facebook':
                                shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=' + url;
                                break;
                            case 'twitter':
                                shareUrl = 'https://twitter.com/intent/tweet?url=' + url + '&text=' + text;
                                break;
                            case 'whatsapp':
                                shareUrl = 'https://wa.me/?text=' + text + '%20' + url;
                                break;
                            case 'telegram':
                                shareUrl = 'https://t.me/share/url?url=' + url + '&text=' + text;
                                break;
                        }
                        
                        if (shareUrl) {
                            window.open(shareUrl, '_blank', 'width=600,height=400');
                        }
                    });
                });

                // ئایکۆنەکان
                var favoritesIcon = document.getElementById('favoritesIcon');
                var bookmarkIcon = document.getElementById('bookmarkIcon');
                var notificationIcon = document.getElementById('notificationIcon');

                if (favoritesIcon) {
                    favoritesIcon.addEventListener('click', function() {
                        alert('بەخێربێیت بۆ لیستی دڵخوازەکان');
                    });
                }
                
                if (bookmarkIcon) {
                    bookmarkIcon.addEventListener('click', function() {
                        alert('فیلمە پاشەکەوتکراوەکان');
                    });
                }
                
                if (notificationIcon) {
                    notificationIcon.addEventListener('click', function() {
                        alert('ئاگادارکردنەوەکان: ٣ فیلمی نوێ');
                    });
                }

                // سۆشیاڵ میدیا
                var socialIcons = document.querySelectorAll('.social-icons i');
                socialIcons.forEach(function(icon) {
                    icon.addEventListener('click', function() {
                        alert('بەم زووانە پەیوەند دەکرێت');
                    });
                });

                // سلایدەر بۆتن
                document.addEventListener('click', function(e) {
                    if (e.target.classList.contains('slide-btn') || e.target.closest('.slide-btn')) {
                        alert('فیلمەکە دەستی پێکرد...');
                    }
                });

            }); // DOMContentLoaded
        })(); // Immediately invoked function
    </script>
</body>
</html>
